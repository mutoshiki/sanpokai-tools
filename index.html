<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山歩会 Tools</title>
    <style>
        :root {
            --ink: #17131a;
            --paper: #fff8df;
            --line: #f5ecd2;
            --gray: #b7b4ac;
            --shadow: #4a3930;
            --green: #4ea64f;
            --deep-green: #1f6e45;
            --blue: #3c78d8;
            --red: #e34b35;
            --gold: #ffd86a;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            color: var(--paper);
            background: #7dbc52;
            font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
        }

        .game {
            position: relative;
            min-height: 100vh;
            padding: max(14px, env(safe-area-inset-top)) 14px max(16px, env(safe-area-inset-bottom));
            overflow: hidden;
            background:
                linear-gradient(rgba(255,255,255,0.04) 50%, rgba(0,0,0,0.06) 50%),
                radial-gradient(circle at 30% 17%, rgba(255,255,255,0.5) 0 2px, transparent 3px),
                url("assets/rpg-mountain-bg.png") center / cover no-repeat,
                linear-gradient(180deg, #80c35b 0%, #3f8c45 100%);
            background-size: 100% 4px, 18px 18px, cover, auto;
            image-rendering: pixelated;
        }

        .game::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 50% 44%, transparent 0 43%, rgba(9, 12, 14, 0.2) 92%),
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.1));
        }

        .hud {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: minmax(112px, 34vw) 1fr;
            gap: 12px;
            align-items: start;
        }

        .box {
            border: 4px solid var(--line);
            outline: 4px solid var(--ink);
            background: rgba(23, 19, 26, 0.94);
            box-shadow: 7px 7px 0 rgba(0,0,0,0.42);
        }

        .status {
            min-height: 124px;
            padding: 10px 11px;
            font-weight: 900;
            text-shadow: 2px 2px 0 #000;
        }

        .status-title {
            display: block;
            margin-bottom: 5px;
            font-size: clamp(14px, 4vw, 18px);
            letter-spacing: 0;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: clamp(15px, 4.7vw, 21px);
            line-height: 1.35;
        }

        .command {
            justify-self: end;
            width: min(57vw, 270px);
            padding: 8px 8px 10px;
        }

        .command-title {
            display: block;
            margin: -21px 8px 7px auto;
            width: fit-content;
            padding: 0 8px;
            color: var(--paper);
            background: var(--ink);
            font-size: clamp(13px, 3.6vw, 16px);
            font-weight: 900;
            text-shadow: 2px 2px 0 #000;
        }

        .command-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .mini-command {
            min-height: 36px;
            border: 0;
            color: var(--paper);
            background: transparent;
            font: inherit;
            font-size: clamp(14px, 4vw, 18px);
            font-weight: 900;
            text-align: left;
            text-shadow: 2px 2px 0 #000;
        }

        .stage {
            position: absolute;
            z-index: 1;
            left: 50%;
            top: 39%;
            width: min(70vw, 330px);
            height: min(38vw, 180px);
            transform: translate(-50%, -50%);
        }

        .shadow-blob {
            position: absolute;
            left: 50%;
            bottom: 4px;
            width: 88px;
            height: 18px;
            transform: translateX(-50%);
            border-radius: 50%;
            background: rgba(0,0,0,0.55);
            animation: shadowPulse 900ms steps(2, end) infinite;
        }

        .mascot {
            position: absolute;
            left: 50%;
            bottom: 22px;
            width: 74px;
            height: 78px;
            transform: translateX(-50%);
            animation: mascotHop 900ms steps(2, end) infinite;
        }

        .mascot::before {
            content: "";
            position: absolute;
            left: 15px;
            top: 12px;
            width: 44px;
            height: 44px;
            background: #d65a68;
            box-shadow:
                0 -12px 0 #66314c,
                -13px -2px 0 #66314c,
                13px -2px 0 #66314c,
                -8px 28px 0 #d65a68,
                8px 28px 0 #d65a68,
                30px 20px 0 #f1b67a,
                -17px 20px 0 #f1b67a;
        }

        .mascot::after {
            content: "";
            position: absolute;
            left: 25px;
            top: 27px;
            width: 6px;
            height: 6px;
            background: var(--ink);
            box-shadow: 18px 0 0 var(--ink), 9px 13px 0 #8f2c39;
        }

        .dialog {
            position: absolute;
            z-index: 2;
            left: 14px;
            right: 14px;
            bottom: calc(166px + max(16px, env(safe-area-inset-bottom)));
            min-height: 92px;
            padding: 14px 14px 13px;
            font-size: clamp(18px, 5.6vw, 28px);
            font-weight: 900;
            line-height: 1.42;
            text-shadow: 2px 2px 0 #000;
        }

        .cursor-text {
            display: inline-block;
            color: var(--gold);
            animation: blink 680ms steps(2, end) infinite;
        }

        .menu {
            position: absolute;
            z-index: 3;
            left: 14px;
            right: 14px;
            bottom: max(16px, env(safe-area-inset-bottom));
            display: grid;
            gap: 12px;
        }

        .choice {
            position: relative;
            display: grid;
            grid-template-columns: 42px 1fr 38px;
            align-items: center;
            min-height: 70px;
            padding: 10px 14px;
            color: var(--paper);
            text-decoration: none;
            font-size: clamp(24px, 7vw, 34px);
            font-weight: 900;
            line-height: 1;
            text-shadow: 3px 3px 0 #000;
            background: rgba(23, 19, 26, 0.96);
            border: 4px solid var(--line);
            outline: 4px solid var(--ink);
            box-shadow:
                inset -6px -6px 0 rgba(255,255,255,0.08),
                8px 8px 0 rgba(0,0,0,0.45);
            -webkit-tap-highlight-color: transparent;
            animation: callout 1500ms ease-in-out infinite;
        }

        .choice:nth-child(2) {
            animation-delay: 220ms;
        }

        .choice::before {
            content: "▶";
            color: var(--gold);
            font-size: 24px;
            text-shadow: 2px 2px 0 #000;
            animation: pointer 640ms steps(2, end) infinite;
        }

        .choice::after {
            content: "TAP";
            justify-self: end;
            display: grid;
            place-items: center;
            width: 38px;
            height: 28px;
            color: var(--ink);
            background: var(--gold);
            border: 3px solid var(--ink);
            box-shadow: 3px 3px 0 #000;
            font-size: 11px;
            line-height: 1;
            text-shadow: none;
            animation: tapBeat 900ms steps(2, end) infinite;
        }

        .choice.car {
            border-color: #d9ebff;
        }

        .choice:active {
            transform: translate(5px, 5px);
            box-shadow:
                inset -6px -6px 0 rgba(255,255,255,0.08),
                3px 3px 0 rgba(0,0,0,0.45);
        }

        .choice:focus-visible {
            outline-color: var(--gold);
        }

        @keyframes pointer {
            50% {
                transform: translateX(7px);
            }
        }

        @keyframes tapBeat {
            50% {
                transform: scale(1.12);
                background: #fff2a4;
            }
        }

        @keyframes callout {
            50% {
                filter: brightness(1.16);
            }
        }

        @keyframes mascotHop {
            50% {
                transform: translateX(-50%) translateY(-8px);
            }
        }

        @keyframes shadowPulse {
            50% {
                width: 74px;
                opacity: 0.4;
            }
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        @media (max-height: 720px) {
            .status {
                min-height: 105px;
            }

            .stage {
                top: 34%;
                transform: translate(-50%, -50%) scale(0.86);
            }

            .dialog {
                bottom: calc(150px + max(12px, env(safe-area-inset-bottom)));
                min-height: 78px;
                padding-block: 10px;
            }

            .choice {
                min-height: 62px;
            }
        }

        @media (min-width: 720px) {
            .game {
                max-width: 520px;
                margin: 0 auto;
                box-shadow: 0 0 0 999px #1f6e45;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .choice,
            .choice::before,
            .choice::after,
            .mascot,
            .shadow-blob,
            .cursor-text {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <main class="game" aria-label="山歩会 Tools">
        <div class="hud">
            <section class="status box" aria-label="ステータス">
                <span class="status-title">さんぽかい</span>
                <div class="stat"><span>LV</span><span>6</span></div>
                <div class="stat"><span>HP</span><span>38</span></div>
                <div class="stat"><span>G</span><span>133</span></div>
            </section>

            <section class="command box" aria-hidden="true">
                <span class="command-title">コマンド</span>
                <div class="command-grid">
                    <span class="mini-command">たたかう</span>
                    <span class="mini-command">じゅもん</span>
                    <span class="mini-command">にげる</span>
                    <span class="mini-command">どうぐ</span>
                </div>
            </section>
        </div>

        <div class="stage" aria-hidden="true">
            <div class="shadow-blob"></div>
            <div class="mascot"></div>
        </div>

        <section class="dialog box" aria-label="案内">
            <span class="cursor-text">コマンド?</span>
        </section>

        <nav class="menu" aria-label="ツール">
            <a class="choice" href="https://mutoshiki.github.io/sanpo-seisan/" target="_blank" rel="noopener">精算</a>
            <a class="choice car" href="https://mutoshiki.github.io/sya-wari-maker" target="_blank" rel="noopener">車割</a>
        </nav>
    </main>
</body>
</html>
