<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山歩会 Tools</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: #1b4428;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
        }

        .screen {
            position: relative;
            display: grid;
            place-items: center;
            min-height: 100vh;
            overflow: hidden;
            background:
                url("assets/shinshu-pixel-mountain-bg.png") center / cover no-repeat,
                #1b4428;
            image-rendering: pixelated;
            isolation: isolate;
        }

        .screen::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(rgba(255, 255, 255, 0.035) 50%, rgba(0, 0, 0, 0.08) 50%),
                radial-gradient(circle at 50% 58%, transparent 0 34%, rgba(0, 0, 0, 0.18) 76%, rgba(0, 0, 0, 0.42) 100%);
            background-size: 100% 5px, auto;
            mix-blend-mode: multiply;
        }

        .buttons {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(12px, 3vw, 28px);
            width: min(88vw, 900px);
        }

        .tool-link {
            display: block;
            width: min(34vw, 360px);
            transition: transform 80ms steps(2, end), filter 80ms steps(2, end);
            filter: drop-shadow(6px 8px 0 rgba(0, 0, 0, 0.28));
        }

        .tool-link:focus-visible {
            outline: 5px solid #ffe45d;
            outline-offset: 3px;
        }

        .tool-link:active {
            transform: translate(4px, 4px);
            filter: drop-shadow(5px 7px 0 rgba(0, 0, 0, 0.34));
        }

        .button-art {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            pointer-events: none;
            user-select: none;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 640px) {
            .screen {
                background-image:
                    url("assets/shinshu-pixel-mountain-bg-portrait.png"),
                    linear-gradient(#4bb2e8, #1b4428);
                background-position: center;
                background-size: cover;
            }

            .buttons {
                flex-direction: column;
                width: min(76vw, 360px);
                gap: 12px;
            }

            .tool-link {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="screen" aria-label="山歩会 Tools">
        <nav class="buttons" aria-label="ツール">
            <a class="tool-link" href="https://mutoshiki.github.io/sya-wari-maker" target="_blank" rel="noopener">
                <span class="sr-only">車割メーカー</span>
                <img class="button-art" src="assets/btn-car-share-maker.png" alt="" aria-hidden="true">
            </a>
            <a class="tool-link" href="https://mutoshiki.github.io/sanpo-seisan/" target="_blank" rel="noopener">
                <span class="sr-only">精算ツール</span>
                <img class="button-art" src="assets/btn-settlement-tool.png" alt="" aria-hidden="true">
            </a>
        </nav>
    </main>
</body>
</html>
